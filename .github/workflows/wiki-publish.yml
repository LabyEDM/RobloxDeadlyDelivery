name: Publish wiki from WikiEdit label

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event.label.name == 'WikiEdit'
    runs-on: ubuntu-latest
    steps:
      - name: Guard labeler
        run: |
          echo "Actor: ${{ github.actor }}"
          if [ "${{ github.actor }}" != "LabyEDM" ]; then
            echo "Only LabyEDM can apply WikiEdit to publish."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Write issue body to file
        run: |
          python - <<'PY'
          import os, json
          from pathlib import Path
          ev = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          body = ev["issue"]["body"] or ""
          Path("issue_body.txt").write_text(body, encoding="utf-8")
          PY

      - name: Publish (validate + write)
        env:
          ISSUE_BODY_PATH: issue_body.txt
        run: |
          python tools/publish_from_issue.py

      - name: Refresh media index
        run: |
          python tools/build_media_index.py

      - name: Commit changes
        run: |
          git config user.name "DeadlyDelivery Wiki Bot"
          git config user.email "deadlydelivery-wiki-bot@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Wiki publish from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment + close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os, json, urllib.request
          ev = json.loads(open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8").read())
          repo = ev["repository"]["full_name"]
          num = ev["issue"]["number"]
          def call(method, url, body=None):
            data = None if body is None else json.dumps(body).encode("utf-8")
            req = urllib.request.Request(url, data=data, method=method, headers={
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "Accept": "application/vnd.github+json"
            })
            return urllib.request.urlopen(req).read()
          call("POST", f"https://api.github.com/repos/{repo}/issues/{num}/comments",
               {"body":"✅ Published to the wiki (committed under `docs/`). If you don’t see it yet, wait for Pages deploy to finish."})
          call("PATCH", f"https://api.github.com/repos/{repo}/issues/{num}", {"state":"closed"})
          PY
